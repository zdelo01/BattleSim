<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleSim</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id = "selection-screen">
        <section class="hero">
            <h1>Pick a class</h1>
            <p>Go ahead and pick one, your not making it out anyways</p>
            <button id="myButton">Click me!</button>
        </section>

        <section class="roles">

            <div class="role">
                <h2>Warrior</h2>
                <p>High hp and defense</p>
            </div>

            <div class="role">
                <h2>Barbarian</h2>
                <p>High damage and speed</p>
            </div>

            <div class="role">
                <h2>Paladin</h2>
                <p>Well-rounded combatant</p>
            </div>

        </section>
    </div>

    <div id = "game-screen" style = "display: none;">
        <h1>Welcome to the Arena!</h1>
        <p id = "status-message"></p>
            <div class = "arena">
                <!--Player-->
                <div class = "gladiator">
                    <h2 id = "player-title"> Hero </h2>
                    <div id = "stats-container"></div>
                </div>
                
                <div class = "vs"> VS </div>

                <!--Enemy-->
                <div class = "gladiator">
                    <h2 id = "enemy-title"> Enemy </h2>
                    <div id = "enemy-stats-container"></div>
                </div>
            </div>
            <!--Battle Log-->
            <div id = "battle-log"></div>

            <!--Controls-->
            <div class = "controls">
                <button id = "attack-btn"> ATTACK </button>
                <button onclick = "location.reload()">FORFEIT</button>
            </div>
    </div>
<script src="script.js"></script>
</body>
</html>
