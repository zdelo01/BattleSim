<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BattleSim</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id = "selection-screen">
        <section class="hero">
            <h1>Pick a class</h1>
            <p>Go ahead and pick one, your not making it out anyways</p>
            <button id="myButton">Click me!</button>
        </section>

        <section class="roles">

            <div class="role">
                <h2>Warrior</h2>
                <p>High hp and defense</p>
            </div>

            <div class="role">
                <h2>Barbarian</h2>
                <p>High damage and speed</p>
            </div>

            <div class="role">
                <h2>Paladin</h2>
                <p>Well-rounded stats with spellcasting</p>
            </div>

        </section>
    </div>

    <div id = "game-screen" style = "display: none;">
        <h1>Game Starting....</h1>
        <p id = "status-message"></p>
        
        <div id = "stats-container"></div>

        <button onclick = "location.reload()">Back to Menu</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
